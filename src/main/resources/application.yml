server:
  port: 8080

spring:
  datasource:
    url: ${AI408_DB_URL:jdbc:mysql://127.0.0.1:3306/ai408?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${AI408_DB_USERNAME:root}
    password: ${AI408_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${AI408_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

logging:
  level:
    org.springframework.security: warn
    org.hibernate.SQL: warn

ai408:
  cos:
    enable: true
    region: ap-shanghai
    secret-id: ${AI408_COS_SECRET_ID:}
    secret-key: ${AI408_COS_SECRET_KEY:}
    bucket-name: ai-question-bank-1331262884
    domain: https://ai-question-bank-1331262884.cos.ap-shanghai.myqcloud.com
    path-prefix: questions
    sign-expire-seconds: 600
    public-read: true
  files:
    storage-dir: ${AI408_STORAGE_DIR:./storage}
    template-dir: ${AI408_TEMPLATE_DIR:./storage/templates}
  auth:
    fixed-code: ${AI408_FIXED_CODE:123456}
    code-expire-seconds: 300
  jwt:
    secret: ${AI408_JWT_SECRET:ai408-local-secret-ai408-local-secret-ai408}
    access-token-minutes: 120
    refresh-token-days: 7
  ai:
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${AI408_QWEN_MODEL:qwen-plus}
    vision-model: ${AI408_QWEN_VISION_MODEL:qwen-vl-max-latest}
    system-prompt: "你是 AI408 刷题系统里的 AI 讲解老师。请使用中文、结构清晰、简洁直接的方式讲解题目，优先输出解题思路、正确答案、易错点和知识点总结。可以参考题库解析，但不要直接照抄原文。"
    mock-enabled: ${AI408_AI_MOCK:false}
  mail:
    host: ${AI408_MAIL_HOST:}
    port: ${AI408_MAIL_PORT:465}
    username: ${AI408_MAIL_USERNAME:}
    password: ${AI408_MAIL_PASSWORD:}
    from: ${AI408_MAIL_FROM:}
    ssl: ${AI408_MAIL_SSL:true}
    mock-enabled: ${AI408_MAIL_MOCK:true}
  invite:
    only: ${AI408_INVITE_ONLY:false}
    allowed-emails: ${AI408_ALLOWED_EMAILS:}
  admin:
    seed-mobile: ${AI408_ADMIN_MOBILE:13800138000}
    seed-email: ${AI408_ADMIN_EMAIL:}
    seed-nickname: ${AI408_ADMIN_NICKNAME:AI408管理员}
  cors:
    allowed-origins:
      - ${AI408_FRONTEND_ORIGIN:http://127.0.0.1:5173}
      - ${AI408_FRONTEND_ORIGIN2:http://localhost:5173}
